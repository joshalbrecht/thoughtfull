    <script language="javascript">

function toggleVisible(id) {
  if ($(id).hasClass('hide')) {
    $(id).removeClass('hide');
  } else {
    $(id).addClass('hide');
  }

}

$(".details").mouseup(function() {
  toggleVisible("#thing");
})

function Course(name, imageUrl, cost) {
  this.name = name;
  this.imageUrl = imageUrl;
  this.cost = cost;
}

function Meal(id, courses, tags) {
  this.id = id;
  this.courses = courses;
  this.tags = tags;
}
Meal.prototype.calculateCost = function() {
  var cost = 0;
  for (var i=0; i<this.courses.length; i++) {
    cost += this.courses[i].cost
  }
  return cost;
}
Meal.prototype.insertHtml = function() {
  var mealString = '<div class="row">';

  for (var i=0; i<this.courses.length; i++) {
    mealString += '<div class="col-md-3" style="padding-left: 0px">';
    mealString += '  <span class="title"><button style="float:right; margin: 0px; padding: 2px" class="btn btn-danger"><img width="18" src="media/replace.png"/></button><img align="left" width="50%" src="media/237295.jpg"/>Morrocan <br/>Beef <br/>Stew</span>';
    mealString += '</div>';
  }

  for (var j=i; j<3; j++) {
    mealString += '<div class="col-md-3" style="padding-left: 0px">';
    mealString += '</div>';
  }

  mealString += '<div class="col-md-3" style="border-left: 1px solid #333; margin-top: 0px; padding-right: 0px">';
  mealString += '  <button style="float: right; margin: 0px; padding: 2px" class="btn btn-danger">Replace <img width="18" src="media/replace.png"/></button>';
  mealString += '  <button style="margin: 0px; padding: 2px" class="btn btn-info details">Details <img width="18" src="media/magnify.png"/></button>';
  mealString += '  <br/>';
  mealString += '  <div class="title" style="padding-top: 67px;float: right">$12.41</div>';
  mealString += '</div>';

  mealString += '  <div id="thing" class="hide">';
  mealString += '    <div style="border-top: 1px solid #333; padding-top: 20px; clear:both"> </div>';
  mealString += '    <div class="col-md-3" style="padding-left: 0px"><img width="80%" src="media/nutrition.gif"/></div>';
  mealString += '    <div class="col-md-3" style="padding-left: 0px"><img width="80%" src="media/nutrition.gif"/></div>';
  mealString += '    <div class="col-md-3" style="padding-left: 0px"><img width="80%" src="media/nutrition.gif"/></div>';
  mealString += '    <div class="col-md-3" style="margin-top: 0px; padding-right: 0px"><img width="80%" src="media/nutrition.gif"/></div>';
  mealString += '  </div>';
  mealString += '</div>';

  $("#meal-list").append(mealString)
}

function addMeal() {
  var courses = [];
  for (var i=0; i<3; i++) {
    var course = new Course("Morrocan Beef Stew", "media/237295.jpg", 3.45);
    courses.unshift(course);
  }
  var meal = new Meal("meal_1", courses, ["healthy", "vegan"]);
  meal.insertHtml();
}
