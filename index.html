    <script language="javascript">

function toggleVisible(id) {
  if ($(id).hasClass('hide')) {
    $(id).removeClass('hide');
  } else {
    $(id).addClass('hide');
  }

}

function Course(name, imageUrl, cost) {
  this.name = name;
  this.imageUrl = imageUrl;
  this.cost = cost;
}

function Meal(id, courses, tags) {
  this.id = id;
  this.courses = courses;
  this.tags = tags;
}
Meal.prototype.calculateCost = function() {
  var cost = 0;
  for (var i=0; i<this.courses.length; i++) {
    cost += this.courses[i].cost
  }
  return cost;
}
Meal.prototype.hasTag = function(tag) {
  for (var i=0; i<this.tags.length; i++) {
    if (this.tags[i] == tag) {
      return true;
    }
  }
  return false;
}
Meal.prototype.checkVisible = function(selectedTags) {
  for (var i=0; i<selectedTags.length; i++) {
    var tag = selectedTags[i];
    if (!this.hasTag(tag)) {
      if (!$(this.htmlId).hasClass('hide')) {
        $(this.htmlId).addClass('hide');
      }
      return false;
    }
  }
  if ($(this.htmlId).hasClass('hide')) {
    $(this.htmlId).removeClass('hide');
  }
  return true;
}
Meal.prototype.insertHtml = function(htmlId) {
  var mealString = '<div class="row" id="'+htmlId+'">';

  for (var i=0; i<this.courses.length; i++) {
    var course = this.courses[i];
    mealString += '<div class="col-md-3" style="padding-left: 0px">';
    mealString += '  <span class="title"><button style="float:right; margin: 0px; padding: 2px" class="btn btn-danger replacer"><img width="18" src="media/replace.png"/></button><img align="left" width="50%" src="'+course.imageUrl+'"/>'+course.name+'</span>';
    mealString += '</div>';
  }

  for (var j=i; j<3; j++) {
    mealString += '<div class="col-md-3" style="padding-left: 0px">';
    mealString += '</div>';
  }

  mealString += '<div class="col-md-3" style="border-left: 1px solid #333; margin-top: 0px; padding-right: 0px">';
  mealString += '  <button style="float: right; margin: 0px; padding: 2px" class="btn btn-danger replacer">Replace <img width="18" src="media/replace.png"/></button>';
  mealString += '  <button id="'+htmlId+'-details" style="margin: 0px; padding: 2px" class="btn btn-info">Details <img width="18" src="media/magnify.png"/></button>';
  mealString += '  <br/>';
  mealString += '  <div class="title" style="padding-top: 67px;float: right">$'+Math.round(this.calculateCost() * 100) / 100+'</div>';
  mealString += '</div>';

  mealString += '  <div id="'+htmlId+'-nutrition" class="hide">';
  mealString += '    <div style="border-top: 1px solid #333; padding-top: 20px; clear:both"> </div>';
  mealString += '    <div class="col-md-3" style="padding-left: 0px"><img width="80%" src="media/nutrition.gif"/></div>';
  mealString += '    <div class="col-md-3" style="padding-left: 0px"><img width="80%" src="media/nutrition.gif"/></div>';
  mealString += '    <div class="col-md-3" style="padding-left: 0px"><img width="80%" src="media/nutrition.gif"/></div>';
  mealString += '    <div class="col-md-3" style="margin-top: 0px; padding-right: 0px"><img width="80%" src="media/nutrition.gif"/></div>';
  mealString += '  </div>';
  mealString += '</div>';

  $("#meal-list").append(mealString)
  this.htmlId = '#'+htmlId;

  $(this.htmlId+"-details").mouseup(function() {
    toggleVisible("#"+htmlId+"-nutrition");
  })
}

var mealId = 0;
var allMeals = [];

function addMeal(tags) {
  var name = tags.join(" ");
  var courses = [];
  var maxVal = 2.99 * Math.random();
  for (var i=0; i<maxVal; i++) {
    var course = new Course(name, "media/237295.jpg", Math.random() * 10.0);
    courses.unshift(course);
  }
  var htmlId = "meal-" + mealId;
  var meal = new Meal(htmlId, courses, tags);
  mealId += 1;
  meal.insertHtml(htmlId);
  allMeals.unshift(meal);
}

addMeal(["healthy", "vegan"]);
addMeal(["healthy"]);
addMeal(["paleo"]);
addMeal(["vegetarian", "paleo"]);
addMeal(["vegan"]);

function filterMeals(tags) {
  var numVisible = 0;
  var maxVisible = parseInt($("#num-meals").find(":selected").text());
  for (var i=0; i<allMeals.length; i++) {
    if (numVisible >= maxVisible) {
      for (var j=i; j<allMeals.length; j++) {
        var meal = allMeals[j];
        if (!$(meal.htmlId).hasClass('hide')) {
          $(meal.htmlId).addClass('hide');
        }
      }
      return;
    }
    var meal = allMeals[i];
    var isVisible = meal.checkVisible(tags);
    if (isVisible) {
      numVisible += 1;
    }
  }
}

function tagRemoveHandler(event) {
  var tags = [];
  var options = $("#main-input option");
  for (var i=0; i<options.length; i++) {
    if (event._value != options[i].value) {
      tags.unshift(options[i].value);
    }
  }
  filterMeals(tags);
}

function getCurrentTags() {
  var tags = [];
  var options = $("#main-input option");
  for (var i=0; i<options.length; i++) {
    tags.unshift(options[i].value);
  }
  return tags;
}

function tagAddHandler() {
  var tags = getCurrentTags();
  filterMeals(tags);
}

$("#num-meals").change(tagAddHandler)

$(document).ready(function(){
    $("#main-input").fcbkcomplete({
        json_url: "data.txt",
        addontab: true,
        height: 3,
        onremove: tagRemoveHandler,
        onselect: tagAddHandler,
        cache: true
    });
    $(".holder").width(350);

    $('.replacer').mouseup(function() {
        $('#myModal').modal();
    });
});

    </script>
